<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Keycap Launcher</title>
    <style>
        :root {
            --nintendo-red: #e60012;
            --lcd-green: #9bbc0f;
            --dark-grey: #2d2d2d;
            --button-grey: #555;
            --button-blue: #0072ce;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--dark-grey);
            border: 4px solid #444;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 12px 0 #000;
            text-align: center;
            box-sizing: border-box;
        }

        .screen {
            background-color: var(--lcd-green);
            color: #0f380f;
            padding: 12px;
            border-radius: 5px;
            border: 6px solid #111;
            margin-bottom: 15px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        /* Restaurada y optimizada la imagen */
        .game-art {
            width: 120px;
            height: 120px;
            background: #444;
            margin: 0 auto 15px;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 5px;
            box-shadow: 0 4px 0 #000;
        }

        .game-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.1s;
            box-sizing: border-box;
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* Botón 1: EJECUTAR (Rojo - Acción principal) */
        .btn-run { 
            background-color: var(--nintendo-red); 
            color: white; 
            box-shadow: 0 4px 0 #a0000d;
        }

        /* Botón 2: DESCARGAR (Azul - Contenido OneDrive) */
        .btn-rom { 
            background-color: var(--button-blue); 
            color: white; 
            box-shadow: 0 4px 0 #004a87;
        }

        /* Botón 3: INSTALAR (Gris - Utilidad App Store/Play Store) */
        .btn-store { 
            background-color: var(--button-grey); 
            color: white; 
            box-shadow: 0 4px 0 #333;
            font-size: 11px;
        }

        .footer {
            font-size: 9px;
            margin-top: 15px;
            color: #666;
            letter-spacing: 1px;
        }

        .instruction-note {
            font-size: 9px;
            color: #999;
            margin-top: 10px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="screen">
            <div id="game-title">CARGANDO JUEGO</div>
        </div>

        <div class="game-art">
            <img id="game-image" src="https://via.placeholder.com/150?text=SCANNER" alt="Portada">
        </div>

        <a id="btn-run" href="#" class="btn btn-run">▶ EJECUTAR AHORA</a>

        <a id="btn-rom" href="#" class="btn btn-rom">💾 1. DESCARGAR JUEGO</a>

        <a id="btn-store" href="#" class="btn btn-store">📱 2. INSTALAR EMULADOR</a>

        <p class="instruction-note">
            Si "EJECUTAR" falla, primero usa el Paso 1 y 2.
        </p>
    </div>

    <div class="footer">
        RETRO KEYCAPS • 3D PRINTED SERIES
    </div>

    <script>
        // CONFIGURACIÓN DE TUS JUEGOS
        const gameData = {
            'zelda': {
                title: 'THE MINISH CAP',
                download: 'TU_LINK_DE_DRIVE_PARA_ZELDA',
                img: 'zelda.jpg'
            },
            'pokemon': {
                title: 'POKEMON EMERALD',
                download: 'TU_LINK_DE_DRIVE_PARA_POKEMON',
                img: 'pokemon.jpg'
            },
            'mario': {
                title: 'SUPER MARIO BROS 3',
                // Tu link de OneDrive
                download: 'https://1drv.ms/u/c/5a0cb820aff9991d/IQCUjCem2t15SK-zycpOznVpAY3dv_NJFoqMM0yO2GQUVoE',
                img: 'mario3.jpg'
            },
            // Añade más aquí siguiendo el mismo formato
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameKey = urlParams.get('game');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (gameKey && gameData[gameKey]) {
            const selected = gameData[gameKey];
            document.getElementById('game-title').innerText = selected.title;
            document.getElementById('game-image').src = selected.img;

            const btnRun = document.getElementById('btn-run');
            const btnRom = document.getElementById('btn-rom');
            const btnStore = document.getElementById('btn-store');

            // Configuración del botón de Descarga (OneDrive)
            btnRom.href = selected.download;

            if (isIOS) {
                // Configuración para iPhone
                btnRun.href = "delta://"; 
                btnRun.innerText = "▶ ABRIR EN DELTA";
                // Link oficial App Store verificado
                btnStore.href = "https://apps.apple.com/mx/app/delta-game-emulator/id1048524688?l=en-GB";
                btnStore.innerText = "📱 INSTALAR DELTA (APP STORE)";
            } else {
                // Configuración para Android
                btnRun.href = "#"; // Generalmente Android abre la ROM tras descargar
                btnRun.innerText = "▶ JUGAR AHORA";
                btnStore.href = "https://play.google.com/store/apps/details?id=com.swordfish.lemuroid";
                btnStore.innerText = "📱 INSTALAR LEMUROID (PLAY STORE)";
            }
        }
    </script>
</body>
</html>
