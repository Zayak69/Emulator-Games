<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Keycap Launcher</title>
    <style>
        :root {
            --primary: #30cfd0;
            --secondary: #330867;
            --nintendo-red: #e60012;
            --lcd-green: #9bbc0f;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #2d2d2d;
            border: 4px solid #555;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 0 #000;
            text-align: center;
        }

        .screen {
            background-color: var(--lcd-green);
            color: #0f380f;
            padding: 15px;
            border-radius: 5px;
            border: 8px solid #333;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .game-art {
            width: 150px;
            height: 150px;
            background: #444;
            margin: 0 auto 15px;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 5px;
        }

        .game-art img { width: 100%; height: 100%; object-fit: cover; }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.1s;
            box-sizing: border-box;
            text-align: center;
        }

        .btn:active { transform: translateY(4px); }

        .btn-step1 { background-color: var(--nintendo-red); color: white; border-bottom: 4px solid #a0000d; }
        .btn-step2 { background-color: #eee; color: #333; border-bottom: 4px solid #bbb; }

        .footer { font-size: 10px; margin-top: 20px; color: #777; }
        
        .instruction-box {
            margin-top: 15px;
            padding: 12px;
            border: 1px dashed #555;
            border-radius: 8px;
            background: #252525;
            font-size: 11px;
            color: #ccc;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="screen">
            <div id="status-text" style="font-size: 10px; margin-bottom: 5px;">SISTEMA LISTO...</div>
            <div id="game-title">SELECCIONE JUEGO</div>
        </div>

        <div class="game-art">
            <img id="game-image" src="https://via.placeholder.com/150?text=ESCANEA+NFC" alt="Portada">
        </div>

        <!-- PASO 1: INSTALAR APP -->
        <a id="btn-install" href="#" class="btn btn-step1">1. INSTALAR EMULADOR</a>

        <!-- PASO 2: DESCARGAR ROM -->
        <a id="btn-download" href="#" class="btn btn-step2">2. DESCARGAR JUEGO</a>

        <div class="instruction-box">
            <strong>¿CÓMO JUGAR?</strong><br>
            1. Instala el emulador si no lo tienes.<br>
            2. Descarga el juego.<br>
            3. Abre el archivo descargado con la App.
        </div>
    </div>

    <div class="footer">
        RETRO KEYCAPS PROJECT © 2026
    </div>

    <script>
        const gameData = {
            'zelda': {
                title: 'THE MINISH CAP',
                download: 'TU_LINK_DE_DRIVE_PARA_ZELDA',
                img: 'zelda.jpg'
            },
            'pokemon': {
                title: 'POKEMON EMERALD',
                download: 'TU_LINK_DE_DRIVE_PARA_POKEMON',
                img: 'pokemon.jpg'
            },
            'mario': {
                title: 'SUPER MARIO BROS 3',
                download: 'https://1drv.ms/u/c/5a0cb820aff9991d/IQCUjCem2t15SK-zycpOznVpAY3dv_NJFoqMM0yO2GQUVoE',
                img: 'mario3.jpg'
            },
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameKey = urlParams.get('game');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (gameKey && gameData[gameKey]) {
            const selected = gameData[gameKey];
            
            document.getElementById('game-title').innerText = selected.title;
            document.getElementById('status-text').innerText = 'JUEGO DETECTADO:';
            document.getElementById('game-image').src = selected.img;

            const btnInstall = document.getElementById('btn-install');
            const btnDownload = document.getElementById('btn-download');

            // Configuramos el link de descarga del juego (Paso 2)
            btnDownload.href = selected.download;

            if (isIOS) {
                // Configuramos el Paso 1 para iPhone con tu link verificado
                btnInstall.innerText = '1. INSTALAR DELTA';
                btnInstall.href = "https://apps.apple.com/mx/app/delta-game-emulator/id1048524688?l=en-GB";
            } else {
                // Configuramos el Paso 1 para Android
                btnInstall.innerText = '1. INSTALAR LEMUROID';
                btnInstall.href = "https://play.google.com/store/apps/details?id=com.swordfish.lemuroid";
            }
        }
    </script>
</body>
</html>
