<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Keycap Launcher</title>
    <style>
        :root {
            --nintendo-red: #e60012;
            --lcd-green: #9bbc0f;
            --dark-grey: #2d2d2d;
            --button-grey: #555;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--dark-grey);
            border: 4px solid #444;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 12px 0 #000;
            text-align: center;
        }

        .screen {
            background-color: var(--lcd-green);
            color: #0f380f;
            padding: 15px;
            border-radius: 5px;
            border: 6px solid #111;
            margin-bottom: 20px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.1s;
            box-sizing: border-box;
        }

        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* Botón 1: EJECUTAR (Rojo - Acción principal) */
        .btn-run { 
            background-color: var(--nintendo-red); 
            color: white; 
            box-shadow: 0 5px 0 #a0000d;
        }

        /* Botón 2: DESCARGAR (Azul - Contenido) */
        .btn-rom { 
            background-color: #0072ce; 
            color: white; 
            box-shadow: 0 5px 0 #004a87;
        }

        /* Botón 3: INSTALAR (Gris - Utilidad) */
        .btn-store { 
            background-color: var(--button-grey); 
            color: white; 
            box-shadow: 0 5px 0 #333;
            font-size: 12px;
        }

        .footer { font-size: 10px; margin-top: 20px; color: #666; letter-spacing: 1px; }

        .divider {
            height: 2px;
            background: #444;
            margin: 20px 0;
            position: relative;
        }
        .divider::after {
            content: "SOPORTE";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-grey);
            padding: 0 10px;
            font-size: 10px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="screen">
            <div style="font-size: 10px; opacity: 0.7;">INSERT COIN...</div>
            <div id="game-title">CARGANDO JUEGO</div>
        </div>

        <!-- BOTÓN DE EJECUCIÓN (Solo si ya tienen todo) -->
        <a id="btn-run" href="#" class="btn btn-run">▶ EJECUTAR AHORA</a>

        <div class="divider"></div>

        <!-- BOTÓN DE DESCARGA (Para obtener tu archivo de OneDrive) -->
        <a id="btn-rom" href="#" class="btn btn-rom">💾 1. DESCARGAR JUEGO</a>

        <!-- BOTÓN DE TIENDA (Para los que no tienen la app) -->
        <a id="btn-store" href="#" class="btn btn-store">📱 2. INSTALAR EMULADOR</a>

        <p style="font-size: 10px; color: #999; margin-top: 15px;">
            *Descarga el juego y ábrelo con el emulador.
        </p>
    </div>

    <div class="footer">
        RETRO KEYCAPS • 3D PRINTED SERIES
    </div>

    <script>
        const gameData = {
            'mario': {
                title: 'SUPER MARIO BROS 3',
                download: 'https://1drv.ms/u/c/5a0cb820aff9991d/IQCUjCem2t15SK-zycpOznVpAY3dv_NJFoqMM0yO2GQUVoE',
                img: 'mario3.jpg'
            },
            // Aquí puedes añadir más juegos fácilmente
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameKey = urlParams.get('game');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (gameKey && gameData[gameKey]) {
            const selected = gameData[gameKey];
            document.getElementById('game-title').innerText = selected.title;

            const btnRun = document.getElementById('btn-run');
            const btnRom = document.getElementById('btn-rom');
            const btnStore = document.getElementById('btn-store');

            // Configuración de la ROM (OneDrive)
            btnRom.href = selected.download;

            if (isIOS) {
                // Configuración para iPhone
                btnRun.href = "delta://"; 
                btnRun.innerText = "▶ ABRIR EN DELTA";
                btnStore.href = "https://apps.apple.com/mx/app/delta-game-emulator/id1048524688?l=en-GB";
                btnStore.innerText = "📱 OBTENER DELTA (APP STORE)";
            } else {
                // Configuración para Android
                btnRun.href = "#"; // Generalmente Android abre la ROM tras descargar
                btnRun.innerText = "▶ JUGAR AHORA";
                btnStore.href = "https://play.google.com/store/apps/details?id=com.swordfish.lemuroid";
                btnStore.innerText = "📱 OBTENER LEMUROID (PLAY STORE)";
            }
        }
    </script>
</body>
</html>
